{{ partial "head.html" . }}
{{ partial "header.html" . }}
<main>
  <section class="full-column">
    <article>
      {{ partial "title.html" . }}
      <div class="publication-dates">
        <strong>Published:</strong>{{ partial "time.html" .PublishDate }}
        <strong>Updated:</strong> {{ partial "time.html" .Lastmod }}
      </div>
      <div class="authorship">
        {{ .GitInfo }}
      </div>
      {{ .Content }}
    </article>
  </section>
</main>
{{ partial "foot.html" . }}
